name: Oddsybot Daily Run
on:
  schedule:
    - cron: '0 9 * * *'  # Her gün 09:00 UTC (12:00 TR)
  workflow_dispatch:  # Manuel çalıştırma butonu

permissions:
  contents: write  # Git push için gerekli

jobs:
  run-bots:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Create directories
      run: |
        mkdir -p filtered docs merged_json
        
    - name: Run all bots
      run: |
        python main.py
        
    - name: Copy JSONs to docs
      run: |
        cp filtered/*.json docs/
        
    - name: Commit and push JSONs
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/*.json
        git commit -m "JSON guncellendi [skip ci]" || echo "No changes"
        git push
        
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: bot-results
        path: |
          filtered/*.json
          filtered/*.xlsx
        retention-days: 7
        
    - name: Deploy to Firebase Storage
      env:
        FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      run: |
        npm install -g firebase-tools
        firebase deploy --only storage --token $FIREBASE_TOKEN